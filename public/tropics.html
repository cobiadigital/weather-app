<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover lets the map extend under the iPhone notch / home bar;
         we then pad the UI back in with env(safe-area-inset-*). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1220" />
    <meta
      name="description"
      content="Atlantic & East Pacific tropical cyclone model tracks and the National Hurricane Center's official forecast."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tropics" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Tropics — NHC models</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%80%3C/text%3E%3C/svg%3E" />

    <!-- Page-specific styling for the storm list, legend, and forecast tracks.
         Everything else reuses /styles.css (topbar, buttons, sheet, status). -->
    <style>
      .tropics-title .dot { background: #ff5a1f; }

      /* Back-to-radar link in the top bar. */
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        min-height: 44px;
        padding: 0 10px;
        color: #cfe0f5;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
      }
      .back-link:active { opacity: 0.6; }

      /* Legend, pinned above the bottom controls. */
      .legend {
        position: absolute;
        left: max(10px, env(safe-area-inset-left));
        bottom: calc(env(safe-area-inset-bottom) + 128px);
        z-index: 700;
        max-width: 62vw;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(11, 18, 32, 0.82);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 11px;
        line-height: 1.5;
        color: #dfe8f5;
        pointer-events: none;
      }
      .legend h4 {
        margin: 0 0 4px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #9fb3c8;
      }
      .legend .row { display: flex; align-items: center; gap: 6px; }
      .legend .swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        flex: 0 0 auto;
      }
      .legend .line {
        width: 16px;
        height: 0;
        flex: 0 0 auto;
        border-top-width: 3px;
        border-top-style: solid;
      }
      .legend.hidden { display: none; }

      /* Storm list inside the slide-up sheet. */
      .storm-list { display: flex; flex-direction: column; gap: 10px; }
      .storm-card {
        text-align: left;
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        font: inherit;
        cursor: pointer;
      }
      .storm-card:active { background: rgba(255, 255, 255, 0.08); }
      .storm-card h3 {
        margin: 0 0 2px;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .storm-card .cat-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex: 0 0 auto;
      }
      .storm-card .meta { color: #9fb3c8; font-size: 13px; }
      .storm-empty { color: #9fb3c8; font-size: 14px; line-height: 1.5; }
      .storm-empty a { color: #7db3ff; }

      /* Popups: keep the NHC links tappable and legible on the dark theme. */
      .storm-popup { font-size: 13px; line-height: 1.5; min-width: 190px; }
      .storm-popup h3 { margin: 0 0 4px; font-size: 15px; }
      .storm-popup .links { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 8px; }
      .storm-popup .links a { color: #0a58ca; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="map" role="application" aria-label="Tropical cyclone model tracks"></div>

    <header class="topbar">
      <div class="title tropics-title">
        <span class="dot" aria-hidden="true"></span>
        Tropics
      </div>
      <div class="top-actions">
        <a class="back-link" href="/" aria-label="Back to radar">
          <span aria-hidden="true">◀</span> Radar
        </a>
      </div>
    </header>

    <!-- Category / track legend -->
    <aside id="legend" class="legend" aria-hidden="false">
      <h4>Wind category</h4>
      <div class="row"><span class="swatch" style="background:#ff4dd8"></span> Cat 4–5</div>
      <div class="row"><span class="swatch" style="background:#ff5a1f"></span> Cat 1–3</div>
      <div class="row"><span class="swatch" style="background:#28c76f"></span> Trop. storm</div>
      <div class="row"><span class="swatch" style="background:#7aa0c4"></span> Depression</div>
      <h4 style="margin-top:6px">Tracks</h4>
      <div class="row"><span class="line" style="border-color:#ffffff"></span> Official (NHC)</div>
      <div class="row"><span class="line" style="border-color:#66ccff"></span> Consensus</div>
      <div class="row"><span class="line" style="border-color:#9fb3c8"></span> Model guidance</div>
    </aside>

    <!-- Slide-up storm list -->
    <section id="stormSheet" class="sheet hidden" aria-hidden="true">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-head">
        <h2 id="stormSheetTitle">Active storms</h2>
        <button id="stormClose" class="icon-btn" type="button" aria-label="Close list">✕</button>
      </div>
      <div id="stormList" class="storm-list"></div>
    </section>

    <!-- Bottom controls -->
    <footer class="controls">
      <div class="control-row toggles">
        <button id="stormsBtn" class="btn primary" type="button">
          <span class="btn-ico" aria-hidden="true">🌀</span>
          <span id="stormsBtnText">Storms</span>
        </button>
        <button id="modelsBtn" class="btn toggle" type="button" aria-pressed="true">
          <span class="btn-ico" aria-hidden="true">〰</span>
          <span>Models</span>
        </button>
        <button id="refreshBtn" class="btn" type="button" aria-label="Refresh">
          <span class="btn-ico" aria-hidden="true">↻</span>
        </button>
      </div>
      <div id="status" class="status">Loading tropical cyclones…</div>
    </footer>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/tropics.js"></script>
  </body>
</html>
